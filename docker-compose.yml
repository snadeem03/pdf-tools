version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - backend-uploads:/app/uploads
    environment:
      - PORT=3001
      - UPLOAD_DIR=uploads/
      - MAX_FILE_SIZE=50000000
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-uploads:
